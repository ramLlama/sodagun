[advisories]
version = 2
# Vulnerabilities are always denied; no explicit key needed
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
unmaintained = "all"
unsound = "all"
# rustls-pemfile is unmaintained (RUSTSEC-2025-0134) but we can't fix it —
# it lives inside microsandbox's dep tree with no available upgrade.
ignore = [
    # rustls-pemfile unmaintained — inside microsandbox's dep tree, no upgrade path
    "RUSTSEC-2025-0134",
    # hickory-proto 0.26.0-alpha.1 DoS advisories — inside microsandbox-network, no upgrade path
    "RUSTSEC-2026-0118",
    "RUSTSEC-2026-0119",
    # bincode unmaintained — inside microsandbox's dep tree, no upgrade path
    "RUSTSEC-2025-0141",
]

[licenses]
version = 2
# Allow the licenses common in the Rust ecosystem
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MPL-2.0",
    "Unicode-3.0",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "OpenSSL",
    "Zlib",
    "0BSD",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
]

[bans]
# Warn on duplicate versions of the same crate in the dep tree
multiple-versions = "warn"
# Disallow wildcard version specs (forces explicit pinning)
wildcards = "deny"

[sources]
# Only allow crates from crates.io; block unknown registries and git deps
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
