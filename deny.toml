[advisories]
version = 2
# Vulnerabilities are always denied; no explicit key needed
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
unmaintained = "all"
unsound = "all"

[licenses]
version = 2
# Allow the licenses common in the Rust ecosystem
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MPL-2.0",
    "Unicode-3.0",
]

[bans]
# Warn on duplicate versions of the same crate in the dep tree
multiple-versions = "warn"
# Disallow wildcard version specs (forces explicit pinning)
wildcards = "deny"

[sources]
# Only allow crates from crates.io; block unknown registries and git deps
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
