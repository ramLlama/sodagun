[image]
base_image        = "rust:1.95-slim-bookworm"
oci_upper_size_mib = 6144
env               = { HOME = "/root" }
setup_files = ["rust-toolchain.toml", "Cargo.toml", "Cargo.lock"]
setup_script = """
#! /usr/bin/env bash

set -euxo pipefail

export PATH="/usr/local/cargo/bin:$PATH"

#
# system setup
#

mkdir -p /scratch
apt-get update -qq
apt-get install -y --no-install-recommends \
  cmake pkg-config \
  curl ca-certificates make \
  libssl-dev libcap-ng-dev \
  socat python3 git

#
# rust setup
#

mkdir -p /tmp/rust-setup
cp /setup-assets/rust-toolchain.toml /tmp/rust-setup/
cp /setup-assets/Cargo.toml /tmp/rust-setup/
cp /setup-assets/Cargo.lock /tmp/rust-setup/
cd /tmp/rust-setup
cargo fetch --locked              # downloads all deps into /root/.cargo/registry
curl -L --proto '=https' --tlsv1.2 -sSf \
  https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
cargo binstall --no-confirm cargo-deny cargo-audit
cd /

#
# claude code setup
#

curl -fsSL https://claude.ai/install.sh | bash

#
# cleanup
#

rm -rf \
  /var/lib/apt/lists/* \
  /tmp/rust-setup \
  /usr/local/cargo/registry/src \
  /usr/local/cargo/bin/cargo-binstall

#
# login shell environment
#

cat >> /root/.profile << 'EOF'
export PATH="/usr/local/cargo/bin:$HOME/.local/bin:$PATH"
ulimit -n 65536
export CARGO_TARGET_DIR=/scratch/target
EOF
"""

[sandbox]
working_dir = "/workspace"
git_access  = "data"
memory_mb   = 3072
cpus        = 3

[sandbox.network]
policy = "claude-dev"

[sandbox.env]
TERM             = "xterm-256color"
RUST_BACKTRACE   = "1"
HOME             = "/root"
