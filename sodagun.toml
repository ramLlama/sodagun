[image]
dockerfile           = "Dockerfile"
namespace_repository = "ramllama-sodagun-image/sodagun"

[sandbox]
working_dir = "/workspace"
memory_mb   = 3072
cpus        = 3

[sandbox.network]
policy = "claude-only"

[sandbox.env]
TERM             = "xterm-256color"
RUST_BACKTRACE   = "1"
HOME             = "/root"
